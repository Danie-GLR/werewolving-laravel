[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_sqlite", "php84Extensions.sqlite3", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo"]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer",
  "/usr/local/bin/composer install --no-dev --optimize-autoloader"
]

[phases.build]
cmds = [
  "cp .env.example .env",
  "php artisan key:generate --force",
  "php artisan config:cache",
  "php artisan route:cache"
]

[start]
cmd = "cp .env.example .env && php artisan key:generate --force && touch database/database.sqlite && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"